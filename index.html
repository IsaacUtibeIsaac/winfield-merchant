<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Ledger [day-day-business] — Professional Retail Trust Ecosystem</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #0b1329; color: #ffffff; overflow-x: hidden; line-height: 1.6; }
        header { background-color: #1c2541; border-bottom: 1px solid #3a506b; position: fixed; width: 100%; top: 0; z-index: 1000; padding: 18px 20px; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 20px; font-weight: 800; color: #ffffff; text-decoration: none; }
        .logo span { color: #64dfdf; }
        .hero-section { padding: 140px 20px 60px 20px; background: linear-gradient(180deg, #1c2541 0%, #0b1329 100%); text-align: center; }
        .ecosystem-window { background-color: #111c38; border: 1px solid #3a506b; border-radius: 12px; padding: 50px 20px; margin: 0 auto; max-width: 900px; box-shadow: 0 20px 45px rgba(0, 0, 0, 0.6); }
        .btn-primary { background-color: #ffffff; color: #0b1329; font-size: 16px; font-weight: 700; padding: 16px 50px; border-radius: 30px; border: none; cursor: pointer; text-transform: uppercase; }
        .btn-primary:hover { background-color: #64dfdf; }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="#" class="logo">Digital Ledger <span>[day-day-business]</span></a>
        </div>
    </header>

    <section class="hero-section">
        <div class="ecosystem-window">
            <h1>Welcome to the Ecosystem</h1>
            <p style="margin: 20px 0 40px; color: #8da9c4;">Professional Retail Trust Engine</p>
            <button class="btn-primary" id="signupBtn">Sign Up Store</button>
        </div>
    </section>

    <script>
        // Production API Credentials
        const SUPABASE_URL = 'https://nflxcavbvymlqulyppgs.supabase.co'; 
        const SUPABASE_ANON_KEY = 'sb_publishable_XLQ97vA1qJmOOqJm-7_05Q_O93NiJ53';
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // Sign Up Logic
        document.getElementById('signupBtn').addEventListener('click', async () => {
            const bName = prompt("Enter your Business/Store Name:");
            if (!bName) return;

            const email = prompt("Enter your Owner Administrator Email:");
            if (!email) return;

            // Inserts store into the database
            const { data, error } = await _supabase
                .from('merchants') 
                .insert([{ business_name: bName, email: email, role: 'OWNER' }]);

            if (error) {
                if (error.code === '23505') {
                    alert(`Registration Failed: You have already registered a store named "${bName}" under this email.`);
                } else {
                    alert("Database Error: " + error.message);
                }
            } else {
                alert(`Success! "${bName}" ecosystem created. You are registered as the OWNER.`);
            }
        });
    </script>
</body>
</html>
